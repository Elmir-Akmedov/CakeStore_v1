<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 Cake Store Manager</title>
  <style>
    :root {
      --bg: #0f0e17; --surface: #1a1a2e; --surface2: #16213e;
      --border: #2a2a4a; --accent: #e94560; --accent2: #f5a623;
      --green: #2ecc71; --text: #eaeaea; --muted: #8888aa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, var(--bg) 70%);
      color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .auth-logo { font-size: 3rem; text-align: center; margin-bottom: 0.5rem; }
    .auth-title {
      font-size: 1.5rem; font-weight: 800; text-align: center;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1.5rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 0.65rem 0.9rem;
      font-size: 0.9rem; width: 100%; transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: var(--accent2); }
    .btn {
      display: block; width: 100%; padding: 0.7rem; border-radius: 8px;
      border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer;
      transition: all 0.15s; text-align: center; text-decoration: none;
    }
    .btn-primary { background: var(--accent2); color: #000; margin-bottom: 0.75rem; }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn-secondary {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); font-size: 0.85rem;
    }
    .errors {
      background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3);
      border-radius: 8px; padding: 0.65rem 0.9rem; margin-bottom: 1rem;
      font-size: 0.82rem; color: var(--accent);
    }
    .errors ul { padding-left: 1rem; }
    .divider { text-align: center; color: var(--muted); font-size: 0.8rem; margin: 0.75rem 0; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
